<b>保護</b>：不明
<b>操作</b>：

上下左右 = 轉向／移動
F = 方向鍵是否帶轉向的開關
Space = 跳躍
C = 噴射上飛（跳躍後）
Z = 蹲下
X = 射擊
A = 切換射擊模式（單射／連三射）
S = 標示開關
M = 音樂開關
P = 暫停
Esc = 離開遊戲
F1 = 直接結束遊戲，回到主畫面
