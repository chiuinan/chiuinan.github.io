<pre style="font-family: MingLiU, monospace; font-size: 16px;">
<b>名稱</b>：毀天滅地 (中文版)
<b>簡介</b>：天堂鳥1998年出品的角色扮演遊戲，由智冠代理發行，以斜角3D畫面呈現，即時格鬥
      方式戰鬥 [待補]。
<IMG SRC="fight/game1.png">

<IMG SRC="fight/game2.png">

<IMG SRC="fight/game3.png">
<b>保護</b>：光碟
<b>限制</b>：螢幕顯示必須設定為256色，可進行下列修改略過檢驗：
      FIGHT.EXE
        08 74 0D 68
        -- EB -- --
<b>備註</b>：建議使用PCem+Win98系統執行，否則速度會過快，不好操控。
<b>操作</b>：遊戲不支援滑鼠，請用鍵盤操作。

方向鍵 = 移動
1～4 = 攻擊招式
Space = 動作（開寶箱等）
Esc = 系統選單
</pre>
