<b>名稱</b>：聖靈騎士 (Soul Slayers，中文版)
<b>簡介</b>：韓國Gleam 1997年出品的角色扮演遊戲，1999年由遊戲橘子中文化並代理發行，以3D
      斜角畫面呈現，採團隊回合制方式戰鬥 [待補]。
<IMG SRC="sslayers/game1.jpg">

<IMG SRC="sslayers/game2.jpg">

<IMG SRC="sslayers/game3.jpg">
<b>保護</b>：光碟
<b>備註</b>：繁中版為1.3版
<b>操作</b>：

滑鼠左鍵／方向鍵 = 移動（雙擊=跑步）
滑鼠右鍵／Enter = 動作（交談／開門／上下樓等，位置要夠近，方向也要對）
滑鼠左鍵（點選自己）／F1 = 功能選單
Esc = 取消
F9 = 顯示除錯資訊
