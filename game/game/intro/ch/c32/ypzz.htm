<b>名稱</b>：鴉片戰爭：禁煙風雲 (繁中／簡中版)
<b>簡介</b>：金盤1997年出品的策略遊戲，主要是做為慶祝1997年香港回歸的愛國之作，1998年由
      歡樂盒代理繁中版，並將慶祝香港回歸的字樣全數刪除 [待補]。
<IMG SRC="ypzz/game1.jpg">

<IMG SRC="ypzz/game2.png">
<b>保護</b>：光碟
<b>限制</b>：遊戲為16位元，只能在Win31/9x/XP系統上執行。
<b>備註</b>：繁中版因增加了歡樂盒的DOS版LOGO顯示程式，會造成不同系統的多種狀況，建議是將
      光碟上的LOGO.EXE更名或刪掉，可避免很多問題（例如XP系統顯示完LOGO後當死）。
</pre>
