<IMG SRC="steel/game1.jpg">

<IMG SRC="steel/game2.png">
<b>保護</b>：光碟
<b>備註</b>：遊戲安裝前，要先建立C:\DOS\DOSHELP.HLP（空檔無妨）。
<b>限制</b>：遊戲程式為16位元，只能在Win31/9x/XP系統上執行。
<b>備註</b>：進入戰鬥畫面若部份區域有黑塊（目前測試所有系統均有此問題，原因不明），可按
      滑鼠右鍵左右移動重繪畫面即可。
