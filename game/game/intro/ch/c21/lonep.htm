<b>保護</b>：光碟
<b>備註</b>：本遊戲無背景音樂。
<b>操作</b>：

Ctrl = 切換移動方式（走路／跑步）
End = 回到主角當前位置
F1 = 切換捲屏方式（自由捲動／隨主角捲動）
F2 = 切換敵方警戒可視狀態
F3 = 切換黑霧效果
F4 = 使用禮物和服裝
