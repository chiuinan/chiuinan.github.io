<pre style="font-family: MingLiU, monospace; font-size: 16px;">
<b>名稱</b>：衝鋒號 (簡中版)
<b>簡介</b>：金盤1995年出品的射擊遊戲，採用3D前進捲軸方式進行 [待補]。
<IMG SRC="cfh/game1.png">
<b>保護</b>：光碟，直接在光碟上執行。
<b>限制</b>：遊戲程式為16位元，只能在Win31/9x/XP系統上執行。
<b>操作</b>：

左右 = 左右移動
上 = 前進／立姿（需先跪姿）
Pad-5 = 跪姿
下 = 臥倒（需先跪姿）
Space = 開火
Ctrl = 跳躍
</pre>
