<b>名稱</b>：機器戰警 (RoboCop: The Future of Law Enforcement，英文版)
<b>簡介</b>：Ocean 1989年出品的動作遊戲，台灣由智冠代理進口 [待補]。
<IMG SRC="robocop/game1.png"> <IMG SRC="robocop/game2.png">
<b>保護</b>：磁片+隱藏檔
<b>檔案</b>：crack.rar = 破解檔
      robocop_pce.rar = PCem整合版（未破解）
<b>操作</b>：

Q = 舉槍向上
A = 蹲下
OP = 左右走（可與上下鍵合按，調整瞄準方向）
Space = 射擊／拳擊
F1 = 徒手攻擊
F2 = 手槍1
F3 = 手槍2
F4 = 散彈槍
F5 = 曼塔原子砲
F7 = 暫停／繼續遊戲
