<b>名稱</b>：俄羅斯方塊2代 (Super Block 2，英文版)
<b>簡介</b>：台大資工系王鎮志1989年開發的俄羅斯遊戲，由太陽軟體代理發行。遊戲規則為清除
      遊戲一開始就有的最上方方塊，即可過關 [待補]。
<IMG SRC="block2/game1.png">

<IMG SRC="block2/game2.png">

<IMG SRC="block2/game3.png">
<b>備註</b>：本版為DosBox整合版
<b>保護</b>：磁片
<b>限制</b>：只能在單色螢幕上執行。
<b>操作</b>：

左右鍵 = 移動
Enter／Pad-5 = 轉動方塊
下鍵 = 直接掉落
Space = 方塊下降5格
F10 = 聲音開關
Esc = 結束遊戲
