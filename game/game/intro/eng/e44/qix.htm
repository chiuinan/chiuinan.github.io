<b>名稱</b>：電腦病毒防衛戰 (Qix，英文版)
<b>簡介</b>：TAITO 1981年出品的益智遊戲，1989年由Threshold移植至DOS，台灣由智冠代理進口。
      遊戲規則便是利用畫線方式，儘量將區域圍起來，但畫線的同時不能被敵方碰到，當
      圍住的區域超出指定的數量，即可過關 [待補]。
<IMG SRC="qix/game1.png"> <IMG SRC="qix/game2.png">
<b>保護</b>：智冠版無保護，國外版為磁片
<b>備註</b>：電腦速度不可太快，否則一下子就陣亡了。
